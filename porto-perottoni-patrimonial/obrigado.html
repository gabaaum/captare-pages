<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Inscrição Confirmada | Porto & Perottoni</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --primary:   #31b9bd;
  --primary-h: #279da0;
  --secondary: #2d2d2d;
  --bg:        #ffffff;
  --surface:   #f9f9f9;
  --card:      #ffffff;
  --border:    #e6e6e6;
  --muted:     #616161;
  --shadow-card: 0 1px 2px rgba(0,0,0,.04), 0 8px 24px -12px rgba(0,0,0,.08);
  --shadow-btn:  0 10px 30px -12px rgba(49,185,189,.35);
}

body {
  font-family: 'Inter', system-ui, sans-serif;
  background: var(--bg);
  color: var(--secondary);
  line-height: 1.7;
  -webkit-font-smoothing: antialiased;
}

/* ── HEADER ── */
header {
  background: var(--bg);
  border-bottom: 1px solid var(--border);
  padding: 18px 24px;
  display: flex;
  align-items: center;
  justify-content: center;
}
.logo {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-family: 'Playfair Display', Georgia, serif;
  font-size: 18px;
  font-weight: 700;
  color: var(--secondary);
  letter-spacing: -0.3px;
}
.logo span { color: var(--primary); }

/* ── MAIN ── */
main {
  background: var(--surface);
  padding: 64px 24px 80px;
  min-height: calc(100vh - 61px);
}
.container {
  max-width: 720px;
  margin: 0 auto;
  display: flex;
  flex-direction: column;
  align-items: center;
  text-align: center;
}

/* Badge confirmação */
.badge {
  display: inline-flex;
  align-items: center;
  gap: 7px;
  background: rgba(49,185,189,.1);
  color: var(--primary);
  font-size: 13px;
  font-weight: 600;
  padding: 6px 16px;
  border-radius: 100px;
  margin-bottom: 28px;
}
.badge svg { flex-shrink: 0; }

h1 {
  font-family: 'Playfair Display', Georgia, serif;
  font-size: clamp(28px, 5vw, 44px);
  font-weight: 700;
  color: var(--secondary);
  line-height: 1.2;
  letter-spacing: -0.5px;
  margin-bottom: 18px;
}

.subtitle {
  font-size: clamp(15px, 2.5vw, 18px);
  color: var(--muted);
  max-width: 540px;
  margin-bottom: 48px;
}
.subtitle strong { color: var(--secondary); font-weight: 600; }

/* Video section */
.video-section {
  width: 100%;
  max-width: 680px;
}
.section-label {
  font-family: 'Playfair Display', Georgia, serif;
  font-size: 20px;
  font-weight: 600;
  color: var(--secondary);
  text-align: left;
  margin-bottom: 16px;
}
.video-wrap {
  position: relative;
  padding-bottom: 56.25%;
  height: 0;
  overflow: hidden;
  border-radius: 16px;
  border: 1px solid var(--border);
  background: var(--secondary);
  box-shadow: var(--shadow-card);
}
.video-wrap iframe {
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 100%;
  border: none;
}

/* CTA card */
.cta-card {
  width: 100%;
  max-width: 560px;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 36px 32px;
  box-shadow: var(--shadow-card);
  margin-top: 48px;
}
.cta-text {
  font-size: 16px;
  color: var(--muted);
  margin-bottom: 24px;
  line-height: 1.7;
}
.cta-text strong {
  font-family: 'Playfair Display', Georgia, serif;
  color: var(--secondary);
}
.cta-text .amp { color: var(--primary); }

.btn-whatsapp {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  background: var(--primary);
  color: #fff;
  font-size: 14px;
  font-weight: 600;
  letter-spacing: 0.04em;
  padding: 15px 28px;
  border-radius: 10px;
  border: none;
  text-decoration: none;
  width: 100%;
  box-shadow: var(--shadow-btn);
  transition: background 0.2s, transform 0.15s;
  cursor: pointer;
}
.btn-whatsapp:hover { background: var(--primary-h); transform: translateY(-1px); }
.btn-whatsapp:active { transform: none; }

/* ── FOOTER ── */
footer {
  background: var(--bg);
  border-top: 1px solid var(--border);
  padding: 22px 24px;
  text-align: center;
  font-size: 13px;
  color: #aaa;
}
</style>
</head>
<body>

          <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/>
        </svg>
        QUERO FALAR COM A EQUIPE DA PORTO & PEROTTONI
      </a>
    </div>

  </div>
</main>

<footer>
  Porto &amp; Perottoni | Advocacia e Contabilidade Tributaria
</footer>

</body>
</html>
